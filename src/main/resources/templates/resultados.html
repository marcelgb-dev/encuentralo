<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Encuéntralo - Resultados</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #005088; border-bottom: 2px solid #005088; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #005088; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; vertical-align: top; }
        .rating { background: #fbbf24; padding: 3px 7px; border-radius: 4px; font-weight: bold; }
        .tag { display: inline-block; background: #e1f5fe; color: #01579b; padding: 2px 8px; border-radius: 12px; font-size: 0.85em; margin: 2px; }
        .coords { font-size: 0.75em; color: #777; display: block; margin-top: 4px; }
        a { color: #005088; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h1>Resultados de Búsqueda</h1>

    <table>
        <thead>
        <tr>
            <th>Negocio</th>
            <th>Rating</th>
            <th>Categorías</th>
            <th>Ubicación</th>
            <th>Contacto</th>
            <th>Acción</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="res : ${resultados}">
            <td>
                <span th:text="${res.nombre}" style="font-weight: bold;">Nombre</span>
                <span class="coords" th:text="'Lat: ' + ${res.latitud} + ' | Lon: ' + ${res.longitud}">Coords</span>
            </td>
            <td>
                <span class="valoracion" th:text="${res.valoracion}">0.0</span>
            </td>
            <td>
                <span th:each="cat : ${res.categorias}" class="tag" th:text="${cat.nombre}">Categoría</span>
            </td>
            <td th:text="${res.direccion}">Dirección</td>
            <td th:text="${res.telefono}">Teléfono</td>
            <td>
                <a th:href="${res.url}" target="_blank">Abrir en Yelp</a>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(resultados)}">
            <td colspan="6" style="text-align:center; padding:30px;">No se encontraron resultados.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
